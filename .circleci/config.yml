version: 2
jobs:
  build:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout

      - restore_cache:
          key: v2-dependency-cache-{{ checksum "pyproject.toml" }}-{{ checksum "requirements.txt" }}-{{ checksum "deploy-requirements.txt" }}-{{ checksum "sfsimodels/__about__.py" }}

      - run:
          name: install python dependencies
          command: |
            python3 -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install -e .[test]
      - save_cache:
          key: v2-dependency-cache-{{ checksum "pyproject.toml" }}-{{ checksum "requirements.txt" }}-{{ checksum "deploy-requirements.txt" }}-{{ checksum "sfsimodels/__about__.py" }}
          paths:
            - "venv"

      - run:
          name: run tests
          command: |
            . venv/bin/activate
            py.test tests -W error
            codecov
      - store_artifacts:
          path: htmlcov/
  deploy:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout

      - restore_cache:
          key: v2-dependency-cache-{{ checksum "pyproject.toml" }}-{{ checksum "requirements.txt" }}-{{ checksum "deploy-requirements.txt" }}-{{ checksum "sfsimodels/__about__.py" }}

      - run:
          name: install python dependencies
          command: |
            python3 -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install -r deploy-requirements.txt
      - save_cache:
          key: v2-dependency-cache-{{ checksum "pyproject.toml" }}-{{ checksum "requirements.txt" }}-{{ checksum "deploy-requirements.txt" }}-{{ checksum "sfsimodels/__about__.py" }}
          paths:
            - "venv"

      - run:
          name: init .pypirc
          command: |
            echo -e "[pypi]" >> ~/.pypirc
            echo -e "username = $PYPI_USERNAME" >> ~/.pypirc
            echo -e "password = $PYPI_PASSWORD" >> ~/.pypirc
      - run:
          name: create packages
          command: |
            . venv/bin/activate
            python -m build
      - run:
          name: upload to pypi
          command: |
            . venv/bin/activate
            twine upload dist/*
workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /[0-9]+(\.[0-9]+)*/
            branches:
              ignore: /.*/
      - deploy:
          requires:
            - build
          filters:
            tags:
              only: /[0-9]+(\.[0-9]+)*/
            branches:
              ignore: /.*/